<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background:#0d1117; color:#e6edf3; display:flex; height:100vh; overflow:hidden; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 280px; background:#161b22; border-right:1px solid #30363d;
      display:flex; flex-direction:column; transition: transform .3s;
    }
    #sidebar.hidden { transform: translateX(-100%); position:absolute; z-index:10; height:100%; }
    #sidebar-header { padding:16px; border-bottom:1px solid #30363d; display:flex; gap:8px; }
    #sidebar-header button {
      flex:1; padding:10px; border:1px solid #30363d; border-radius:8px;
      background:#21262d; color:#e6edf3; cursor:pointer; font-size:14px;
      transition: background .2s;
    }
    #sidebar-header button:hover { background:#30363d; }
    #chat-list { flex:1; overflow-y:auto; padding:8px; }
    .chat-item {
      padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:4px;
      display:flex; align-items:center; justify-content:space-between;
      transition: background .2s; border:1px solid transparent;
    }
    .chat-item:hover { background:#21262d; }
    .chat-item.active { background:#1f6feb22; border-color:#1f6feb; }
    .chat-item-title {
      flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      font-size:13px; color:#c9d1d9;
    }
    .chat-item-actions { display:flex; gap:4px; opacity:0; transition: opacity .2s; }
    .chat-item:hover .chat-item-actions { opacity:1; }
    .chat-item-actions button {
      background:none; border:none; color:#8b949e; cursor:pointer;
      font-size:14px; padding:2px 5px; border-radius:4px;
    }
    .chat-item-actions button:hover { background:#30363d; color:#f85149; }
    .chat-item-meta { font-size:10px; color:#484f58; margin-top:2px; }

    /* ── MAIN AREA ── */
    #main { flex:1; display:flex; flex-direction:column; min-width:0; }
    #topbar {
      padding:12px 16px; border-bottom:1px solid #30363d; display:flex;
      align-items:center; gap:12px; background:#161b22;
    }
    #topbar button { background:none; border:none; color:#e6edf3; font-size:20px; cursor:pointer; }
    #topbar-title {
      font-size:16px; font-weight:600; flex:1; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap;
    }
    #topbar-title-input {
      background:#0d1117; border:1px solid #1f6feb; border-radius:6px;
      color:#e6edf3; padding:4px 8px; font-size:15px; width:100%; display:none;
    }

    /* ── MESSAGES ── */
    #messages {
      flex:1; overflow-y:auto; padding:20px; display:flex;
      flex-direction:column; gap:16px;
    }
    .msg {
      max-width:75%; padding:12px 16px; border-radius:12px;
      line-height:1.6; font-size:14px; position:relative; word-wrap:break-word;
    }
    .msg.user {
      align-self:flex-end; background:#1f6feb; color:#fff;
      border-bottom-right-radius:4px;
    }
    .msg.assistant {
      align-self:flex-start; background:#21262d; color:#c9d1d9;
      border-bottom-left-radius:4px;
    }
    .msg pre { background:#0d1117; padding:12px; border-radius:6px; overflow-x:auto; margin:8px 0; }
    .msg code { font-family:'Fira Code',monospace; font-size:13px; }
    .msg-actions {
      position:absolute; top:4px; right:8px; display:none; gap:4px;
    }
    .msg:hover .msg-actions { display:flex; }
    .msg-actions button {
      background:rgba(0,0,0,0.3); border:none; color:#fff; cursor:pointer;
      font-size:11px; padding:2px 6px; border-radius:4px;
    }
    .msg-actions button:hover { background:rgba(0,0,0,0.6); }
    .msg-time { font-size:10px; opacity:0.5; margin-top:4px; }
    .msg-edited { font-size:10px; opacity:0.4; font-style:italic; }

    /* ── WELCOME ── */
    #welcome {
      flex:1; display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:12px; color:#484f58;
    }
    #welcome span { font-size:48px; }
    #welcome p { font-size:16px; }

    /* ── INPUT ── */
    #input-area {
      padding:16px; border-top:1px solid #30363d; display:flex; gap:10px;
      background:#161b22;
    }
    #input-area textarea {
      flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px;
      color:#e6edf3; padding:12px; font-size:14px; resize:none;
      min-height:48px; max-height:150px; font-family:inherit;
      transition: border-color .2s;
    }
    #input-area textarea:focus { outline:none; border-color:#1f6feb; }
    #input-area button {
      padding:12px 20px; background:#1f6feb; color:#fff; border:none;
      border-radius:10px; cursor:pointer; font-size:16px; transition: background .2s;
    }
    #input-area button:hover { background:#388bfd; }
    #input-area button:disabled { background:#21262d; cursor:not-allowed; }

    /* ── LOADING ── */
    .typing-indicator span {
      display:inline-block; width:8px; height:8px; background:#8b949e;
      border-radius:50%; margin:0 2px; animation: bounce .6s infinite alternate;
    }
    .typing-indicator span:nth-child(2) { animation-delay:.2s; }
    .typing-indicator span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { to { transform:translateY(-6px); opacity:.3; } }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }

    /* ── RESPONSIVE ── */
    @media (max-width:768px) {
      #sidebar { position:absolute; z-index:10; height:100%; }
      #sidebar.hidden { transform:translateX(-100%); }
      .msg { max-width:90%; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <button onclick="createNewChat()">✦ New Chat</button>
  </div>
  <div id="chat-list"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button onclick="toggleSidebar()">☰</button>
    <span id="topbar-title">AI Chat</span>
    <input id="topbar-title-input" type="text"
           onkeydown="if(event.key==='Enter')saveTitleEdit()"
           onblur="saveTitleEdit()" />
    <button onclick="startTitleEdit()" title="Başlığı düzenle">✏️</button>
  </div>

  <div id="messages">
    <div id="welcome">
      <span>✦</span>
      <p>Start a new conversation or select a previous one</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type your message..."
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
              oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ══════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════
  let currentSessionId = null;
  let chatMessages = [];

  // ══════════════════════════════════════════
  //  INIT — Sayfa yüklenince sohbet listesini çek
  // ══════════════════════════════════════════
  document.addEventListener("DOMContentLoaded", () => {
    loadChatList();
  });

  // ══════════════════════════════════════════
  //  API HELPERS
  // ══════════════════════════════════════════
  async function api(url, opts = {}) {
    const res = await fetch(url, {
      headers: { "Content-Type": "application/json" },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    return res.json();
  }

  // ══════════════════════════════════════════
  //  CHAT LIST — Sidebar
  // ══════════════════════════════════════════
  async function loadChatList() {
    const data = await api("/chats");
    const list = document.getElementById("chat-list");
    list.innerHTML = "";

    if (!data.chats || data.chats.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#484f58;font-size:13px;">No chats yet</div>';
      return;
    }

    data.chats.forEach(chat => {
      const div = document.createElement("div");
      div.className = "chat-item" + (chat.sessionId === currentSessionId ? " active" : "");
      div.innerHTML = `
        <div style="flex:1;min-width:0;">
          <div class="chat-item-title">${escapeHtml(chat.title || "Untitled")}</div>
          <div class="chat-item-meta">${chat.messageCount || 0} messages</div>
        </div>
        <div class="chat-item-actions">
          <button onclick="event.stopPropagation();deleteChat('${chat.sessionId}')" title="Sil">🗑️</button>
        </div>
      `;
      div.onclick = () => loadChat(chat.sessionId);
      list.appendChild(div);
    });
  }

  // ══════════════════════════════════════════
  //  CREATE NEW CHAT
  // ══════════════════════════════════════════
  async function createNewChat() {
    const data = await api("/chats", { method: "POST", body: { title: "New Chat" } });
    if (data.success) {
      currentSessionId = data.sessionId;
      chatMessages = [];
      renderMessages();
      document.getElementById("topbar-title").textContent = data.title;
      await loadChatList();
      document.getElementById("user-input").focus();
    }
  }

  // ══════════════════════════════════════════
  //  LOAD CHAT — Sohbeti yükle ve devam et
  // ══════════════════════════════════════════
  async function loadChat(sessionId) {
    const data = await api(`/chats/${sessionId}`);
    if (!data.success) return;

    currentSessionId = sessionId;
    chatMessages = data.chat.messages || [];
    document.getElementById("topbar-title").textContent = data.chat.title || "Untitled";
    renderMessages();
    await loadChatList();
    document.getElementById("user-input").focus();
  }

  // ══════════════════════════════════════════
  //  DELETE CHAT
  // ══════════════════════════════════════════
  async function deleteChat(sessionId) {
    if (!confirm("Bu sohbeti silmek istediğinize emin misiniz?")) return;
    await api(`/chats/${sessionId}`, { method: "DELETE" });
    if (currentSessionId === sessionId) {
      currentSessionId = null;
      chatMessages = [];
      document.getElementById("topbar-title").textContent = "AI Chat";
      document.getElementById("messages").innerHTML = `
        <div id="welcome"><span>✦</span><p>Start a new conversation or select a previous one</p></div>
      `;
    }
    await loadChatList();
  }

  // ══════════════════════════════════════════
  //  TITLE EDIT
  // ══════════════════════════════════════════
  function startTitleEdit() {
    if (!currentSessionId) return;
    const titleSpan = document.getElementById("topbar-title");
    const titleInput = document.getElementById("topbar-title-input");
    titleInput.value = titleSpan.textContent;
    titleSpan.style.display = "none";
    titleInput.style.display = "block";
    titleInput.focus();
    titleInput.select();
  }

  async function saveTitleEdit() {
    const titleSpan = document.getElementById("topbar-title");
    const titleInput = document.getElementById("topbar-title-input");
    const newTitle = titleInput.value.trim();
    titleInput.style.display = "none";
    titleSpan.style.display = "block";

    if (newTitle && currentSessionId) {
      titleSpan.textContent = newTitle;
      await api(`/chats/${currentSessionId}`, { method: "PATCH", body: { title: newTitle } });
      await loadChatList();
    }
  }

  // ══════════════════════════════════════════
  //  SEND MESSAGE
  // ══════════════════════════════════════════
  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    // Eğer aktif sohbet yoksa yeni oluştur
    if (!currentSessionId) {
      const data = await api("/chats", { method: "POST", body: { title: text.slice(0, 80) } });
      if (!data.success) return;
      currentSessionId = data.sessionId;
      chatMessages = [];
    }

    input.value = "";
    input.style.height = "48px";
    const sendBtn = document.getElementById("send-btn");
    sendBtn.disabled = true;

    // User mesajını ekle
    const userMsg = { role: "user", content: text, timestamp: new Date().toISOString() };
    chatMessages.push(userMsg);
    renderMessages();

    // Backend'e kaydet
    await api(`/chats/${currentSessionId}/messages`, {
      method: "POST", body: { role: "user", content: text }
    });

    // Loading göster
    showTyping();

    try {
      // AI yanıtını al (MCP üzerinden)
      const response = await api("/mcp", {
        method: "POST",
        body: {
          jsonrpc: "2.0",
          id: Date.now(),
          method: "tools/call",
          params: {
            name: "analyze_and_plan",
            arguments: { task: text },
            sessionId: currentSessionId
          }
        }
      });

      const aiText = response?.result?.content?.[0]?.text || "No response.";
      const aiMsg = { role: "assistant", content: aiText, timestamp: new Date().toISOString() };
      chatMessages.push(aiMsg);

      // Backend'e AI yanıtını da kaydet
      await api(`/chats/${currentSessionId}/messages`, {
        method: "POST", body: { role: "assistant", content: aiText }
      });

    } catch (err) {
      chatMessages.push({ role: "assistant", content: "⚠️ Error: " + err.message, timestamp: new Date().toISOString() });
    }

    hideTyping();
    renderMessages();
    sendBtn.disabled = false;
    await loadChatList();
    input.focus();
  }

  // ══════════════════════════════════════════
  //  EDIT MESSAGE
  // ══════════════════════════════════════════
  function editMessage(index) {
    const msg = chatMessages[index];
    const newContent = prompt("Mesajı düzenle:", msg.content);
    if (newContent !== null && newContent.trim() !== "") {
      chatMessages[index].content = newContent.trim();
      chatMessages[index].editedAt = new Date().toISOString();
      renderMessages();
      // Backend'e kaydet
      api(`/chats/${currentSessionId}/messages/${index}`, {
        method: "PATCH", body: { content: newContent.trim() }
      });
    }
  }

  function deleteMessage(index) {
    if (!confirm("Bu mesajı silmek istiyor musunuz?")) return;
    chatMessages.splice(index, 1);
    renderMessages();
    api(`/chats/${currentSessionId}/messages/${index}`, { method: "DELETE" });
  }

  // ══════════════════════════════════════════
  //  RENDER MESSAGES
  // ══════════════════════════════════════════
  function renderMessages() {
    const container = document.getElementById("messages");

    if (chatMessages.length === 0) {
      container.innerHTML = `<div id="welcome"><span>✦</span><p>Start a new conversation or select a previous one</p></div>`;
      return;
    }

    container.innerHTML = chatMessages.map((msg, i) => `
      <div class="msg ${msg.role}">
        <div class="msg-actions">
          <button onclick="editMessage(${i})" title="Düzenle">✏️</button>
          <button onclick="deleteMessage(${i})" title="Sil">🗑️</button>
        </div>
        <div>${formatContent(msg.content)}</div>
        ${msg.editedAt ? '<div class="msg-edited">(edited)</div>' : ''}
        <div class="msg-time">${formatTime(msg.timestamp)}</div>
      </div>
    `).join("");

    container.scrollTop = container.scrollHeight;
  }

  // ══════════════════════════════════════════
  //  TYPING INDICATOR
  // ══════════════════════════════════════════
  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.id = "typing";
    div.className = "msg assistant";
    div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  // ══════════════════════════════════════════
  //  UTILITIES
  // ══════════════════════════════════════════
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatContent(text) {
    if (!text) return "";
    // Code blocks
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code style="background:#0d1117;padding:2px 6px;border-radius:4px;">$1</code>');
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function formatTime(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    return d.toLocaleString("tr-TR", { hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit" });
  }

  function autoResize(el) {
    el.style.height = "48px";
    el.style.height = Math.min(el.scrollHeight, 150) + "px";
  }

  function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("hidden");
  }
</script>
</body>
</html>
